services:
  - type: web
    name: betterquizzes
    env: node
    plan: free
    buildCommand: npm ci --no-audit --no-fund && npm run build
    startCommand: npm run serve:prod
    healthCheckPath: /healthz
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_ENV
        value: production
