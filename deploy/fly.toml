app = "betterquizzes"
primary_region = "iad"

[build]

[env]
  HOST = "0.0.0.0"
  PORT = "8787"
  NODE_ENV = "production"
  PUBLIC_BASE_URL = "https://app.betterquizzes.com"
  PUBLIC_ORIGIN = "https://app.betterquizzes.com"
  WIDGET_DOMAIN = "https://app.betterquizzes.com"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  path = "/healthz"
  timeout = "2s"
